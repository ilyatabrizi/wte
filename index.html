<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --ink:#0B0A0C;--surface:#141215;--surface2:#1c191e;--bone:#F4F1EC;--ember:#FF5B3D;--ash:#8A848F;
    --line:rgba(138,132,143,.14);--line2:rgba(138,132,143,.24);--good:#4BB07A;--gold:#C9A86A;
    --top:env(safe-area-inset-top);--bot:env(safe-area-inset-bottom);
  }
  html,body{margin:0;padding:0;height:100%;overflow:hidden;overscroll-behavior:none}
  body{background:#050406;color:var(--bone);
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  /* Anchor to the REAL viewport edges — never measure.
     In an installed iOS PWA, 100dvh / innerHeight under-report by roughly the
     status-bar height while the webview is actually full-screen, which left dead
     space under the nav. top+bottom anchoring cannot under-report. */
  #stage{position:fixed;top:0;right:0;bottom:0;left:0;display:flex;align-items:stretch;justify-content:center;background:var(--ink)}
  #device{position:relative;width:100%;max-width:480px;height:100%;background:var(--ink);overflow:hidden;margin:0 auto;display:flex;flex-direction:column}
  @media(min-width:481px){
    #stage{background:radial-gradient(130% 90% at 15% -5%,#16100f 0%,#070609 62%);padding:0}
    #device{box-shadow:0 0 0 1px rgba(138,132,143,.10)}
  }
  #app{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;scrollbar-width:none;padding-top:max(var(--top),12px);overscroll-behavior-y:contain}
  #app::-webkit-scrollbar{display:none}
  /* Nav is pinned to the REAL viewport bottom, not to a container that might come
     up short in an installed PWA. It physically cannot float above the screen edge. */
  #footer{position:fixed;bottom:0;left:0;right:0;z-index:36;display:flex;justify-content:center}
  #footer>*{width:100%;max-width:480px}
  .scroll{scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .scroll::-webkit-scrollbar{display:none;width:0;height:0}
  .ic{display:inline-flex;align-items:center;justify-content:center;line-height:0}
  .ic svg{display:block}
  .cov{position:absolute;inset:0;width:100%;height:100%}
  .covimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .avimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:inherit}
  .wtemark{height:1em;width:auto;vertical-align:-0.18em}
  .press{transition:transform .16s cubic-bezier(.22,1,.36,1)}
  .press:active{transform:scale(.96)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:20px}
  .glass{background:rgba(11,10,12,.5);-webkit-backdrop-filter:blur(16px) saturate(150%);backdrop-filter:blur(16px) saturate(150%);border:1px solid var(--line2)}
  .btn{border:none;background:var(--ember);color:#0B0A0C;border-radius:15px;padding:16px;font-weight:600;font-size:15.5px;letter-spacing:-.01em;cursor:pointer;width:100%}
  .btn-ghost{border:1px solid var(--line2);background:transparent;color:var(--bone);border-radius:15px;padding:15px;font-weight:600;font-size:15px;cursor:pointer;width:100%}
  .eyebrow{font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ash)}
  .h1{font-weight:700;font-size:29px;letter-spacing:-.03em;color:var(--bone)}
  .mut{color:var(--ash)}
  .hicon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--bone);cursor:pointer;padding:0}
  .avatar{flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--bone);font-weight:600;overflow:hidden;position:relative}
  .vb{display:inline-flex;vertical-align:middle}
  .footwrap{background:rgba(11,10,12,.66);-webkit-backdrop-filter:blur(30px) saturate(1.9);backdrop-filter:blur(30px) saturate(1.9);border-top:1px solid rgba(138,132,143,.16);padding:14px 20px calc(max(var(--bot),10px) + 8px)}
  .navbar{display:flex;align-items:center;justify-content:space-between;padding:7px 12px calc(max(var(--bot),8px) + 5px);
    background:rgba(11,10,12,.66);-webkit-backdrop-filter:blur(30px) saturate(1.9);backdrop-filter:blur(30px) saturate(1.9);border-top:1px solid rgba(138,132,143,.16)}
  .navitem{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;color:var(--ash);transition:color .18s;position:relative}
  .navitem .lab{font-size:10px;font-weight:600}
  .navitem.on{color:var(--ember)}
  .navitem .dot{position:absolute;top:2px;left:50%;transform:translateX(9px);min-width:6px;height:6px;border-radius:999px;background:var(--ember)}
  .seg{background:none;border:none;cursor:pointer;padding:0 0 11px;position:relative;font-weight:600;font-size:15px;letter-spacing:-.01em;color:var(--ash);white-space:nowrap;flex:none}
  .seg.on{color:var(--bone);font-weight:700}
  .seg.on:after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;border-radius:2px;background:var(--ember)}
  .chip{cursor:pointer;border:1px solid var(--line2);background:transparent;color:var(--bone);border-radius:999px;padding:9px 15px;font-size:13.5px;font-weight:600;white-space:nowrap}
  .chip.on{border-color:var(--bone);background:var(--bone);color:#0B0A0C}
  .fchip{display:inline-flex;align-items:center;gap:6px;cursor:pointer;border:1px solid var(--line2);background:var(--surface);color:var(--bone);border-radius:999px;padding:8px 13px;font-size:13px;font-weight:600;white-space:nowrap}
  .prem-chip{display:inline-flex;align-items:center;gap:5px;border:1px solid rgba(201,168,106,.5);color:var(--gold);border-radius:999px;padding:4px 9px;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  .bubble{max-width:76%;padding:10px 14px;border-radius:18px;font-size:14.5px;line-height:1.4;word-wrap:break-word}
  .bubble.me{background:var(--ember);color:#0B0A0C;border-bottom-right-radius:5px;align-self:flex-end}
  .bubble.them{background:var(--surface2);color:var(--bone);border-bottom-left-radius:5px;align-self:flex-start}
  .sheet-bg{position:absolute;inset:0;z-index:50;background:rgba(5,4,6,.66);animation:fade .25s ease both}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:51;background:var(--surface);border-radius:26px 26px 0 0;border-top:1px solid var(--line2);padding:9px 20px calc(max(var(--bot),14px) + 6px);animation:sheet .36s cubic-bezier(.22,1,.36,1) both;max-height:92%;overflow-y:auto}
  .grab{width:38px;height:4px;border-radius:2px;background:var(--line2);margin:0 auto 16px}
  .stepdot{height:4px;border-radius:2px;background:var(--surface2);flex:1;transition:background .25s}
  .stepdot.on{background:var(--ember)}
  .field{width:100%;border:1px solid var(--line2);background:var(--surface2);border-radius:13px;padding:14px;font-size:15px;color:var(--bone);outline:none}
  .field:focus{border-color:var(--ember)}
  .wheel{position:relative;height:224px;overflow:hidden}
  .wheel:before,.wheel:after{content:"";position:absolute;left:0;right:0;height:89px;z-index:3;pointer-events:none}
  .wheel:before{top:0;background:linear-gradient(180deg,var(--surface) 8%,rgba(20,18,21,0))}
  .wheel:after{bottom:0;background:linear-gradient(0deg,var(--surface) 8%,rgba(20,18,21,0))}
  .wband{position:absolute;top:89px;left:8px;right:8px;height:46px;border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);z-index:2;pointer-events:none;border-radius:12px}
  .cws{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;perspective:1100px;position:relative}
  .cws::-webkit-scrollbar{display:none}
  .wsp{height:89px}
  .witem{height:46px;scroll-snap-align:center;display:flex;align-items:center;justify-content:center;gap:10px;transform-style:preserve-3d;backface-visibility:hidden;will-change:transform,opacity;cursor:pointer}
  .witem .wl{font-weight:600;font-size:20px;letter-spacing:-.015em;color:var(--bone);white-space:nowrap}
  .witem .wc{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--ash)}
  .rise{animation:rise .5s cubic-bezier(.22,1,.36,1) both}
  .fadein{animation:fade .3s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(.8);opacity:0}55%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  @keyframes sheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes toast{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
  :focus-visible{outline:2px solid var(--ember);outline-offset:2px}
  @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

function unreadChats(){return CONVOS.reduce(function(a,c){return a+(c.unread&&!state.blocked[c.user]?1:0);},0);}

function avatarPlain(key,size){var u=USERS[key]||{initials:'?',bg:'#2a2430'};var fs=Math.round(size*0.38);
 return '<span class="avatar" style="width:'+size+'px;height:'+size+'px;background:'+u.bg+';font-size:'+fs+'px">'+u.initials+avPhoto(u)+'</span>';}
function nameLine(key,px){var u=USERS[key];return '<span style="font-weight:600;font-size:'+(px||14)+'px;color:var(--bone)">'+u.name+'</span>'+(isVerified(key)?' '+vbadge(Math.round((px||14)*1.05)):'');}

function friendsGoing(ev){var f=ev.friends||[];if(!f.length)return '';var n=f.slice(0,2).map(function(k){return USERS[k].name.split(' ')[0];}).join(', ');return n+(f.length>2?' +'+(f.length-2):'');}

function wideCard(ev){var saved=state.saved.indexOf(ev.id)>-1;
 return '<div class="press" data-act="open" data-id="'+ev.id+'" style="flex:none;width:220px;cursor:pointer">'

 +(ev.premium?'<div class="glass" style="position:absolute;top:9px;left:9px;border-radius:999px;padding:4px 9px;color:var(--gold);font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:4px">'+ico('diamond',10,2)+'Premium</div>':'')
 +'<button class="press glass" data-act="save" data-id="'+ev.id+'" style="position:absolute;top:9px;right:9px;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;color:var(--bone)">'+heartIco(saved,15)+'</button>'

 return '<div><div style="margin:0 0 12px;padding:0 2px"><div style="font-weight:700;font-size:18px;letter-spacing:-.02em;color:var(--bone)">'+title+'</div>'+(sub?'<div style="font-size:12px;color:var(--ash);margin-top:2px">'+sub+'</div>':'')+'</div>'

 +'<button class="press" data-act="followhost" data-host="'+esc(ev.host)+'" style="flex:none;border:'+(f?'none':'1.5px solid var(--bone)')+';background:'+(f?'var(--surface2)':'transparent')+';color:var(--bone);border-radius:999px;padding:7px 14px;font-weight:600;font-size:12.5px;cursor:pointer">'+(f?'Following':'Follow')+'</button></div>'

/* ---------- home feed ---------- */
function heroReason(ev){if(state.followingHosts[ev.host])return 'From '+ev.host+', who you follow';if(ev.cat==='Nightlife')return 'Because you saved techno nights';return 'Recommended in '+cityShort();}
function foryouFeed(){var ev=cityEvents();if(!ev.length)return [];
 var byGoing=ev.slice().sort(function(a,b){return b.going-a.going;});
 var wf=ev.filter(function(e){return e.friends.length&&!state.blocked[e.friends[0]];});
 var hero=byGoing[0],b=[];
 b.push({t:'hero',id:hero.id,reason:heroReason(hero)});
 if(wf[0])b.push({t:'proof',id:wf[0].id});
 b.push({t:'strip',title:'Trending in '+cityShort(),ids:byGoing.slice(1,7).map(function(e){return e.id;})});
 var reco=ev[3%ev.length];b.push({t:'reco',id:reco.id,reason:'Popular in '+catLabel(reco.cat)});
 var prem=null;for(var i=0;i<ev.length;i++)if(ev[i].premium){prem=ev[i];break;}if(prem)b.push({t:'premium',id:prem.id});
 var hev=null;for(i=0;i<ev.length;i++)if(state.followingHosts[ev[i].host]){hev=ev[i];break;}b.push({t:'host',id:(hev||ev[1]).id,ago:'3h'});
 var fp=allPosts().filter(function(p){return state.followingUsers[p.author];})[0];if(fp)b.push({t:'post',post:fp});
 b.push({t:'collection',title:'Your evening, sorted',sub:'A short list near you',ids:ev.slice(0,6).map(function(e){return e.id;})});
 if(wf[1])b.push({t:'proof',id:wf[1].id});
 return b;}
function followingFeed(){var ev=cityEvents(),hev=ev.filter(function(e){return state.followingHosts[e.host];}),b=[];
 var posts=allPosts().filter(function(p){return state.followingUsers[p.author];});
 if(hev[0])b.push({t:'host',id:hev[0].id,ago:'2h'});
 if(posts[0])b.push({t:'post',post:posts[0]});
 if(hev[1])b.push({t:'host',id:hev[1].id,ago:'5h'});
 if(posts[1])b.push({t:'post',post:posts[1]});
 var fe=null;for(var i=0;i<ev.length;i++)if(ev[i].friends.length&&!state.blocked[ev[i].friends[0]]){fe=ev[i];break;}
 if(fe)b.push({t:'friend',id:fe.id,who:fe.friends[0],action:'is going to',ago:'8h'});
 if(posts[2])b.push({t:'post',post:posts[2]});
 if(!b.length)b.push({t:'empty'});
 return b;}
function buildFeed(){var m=state.feed;
 if(m==='foryou')return foryouFeed();
 if(m==='following')return followingFeed();
 var ev=cityEvents();
 if(m==='nearby'){ev=ev.slice().sort(function(a,b){return a.dist-b.dist;});return ev.slice(0,10).map(function(e){return {t:'reco',id:e.id,reason:e.dist+' mi · '+e.venue};});}
 if(m==='public'){ev=ev.filter(function(e){return !e.premium;}).sort(function(a,b){return b.going-a.going;});return ev.slice(0,10).map(function(e){return {t:'reco',id:e.id,reason:'Open to everyone · '+e.going+' going'};});}
 if(m==='private'){ev=ev.filter(function(e){return e.premium;});var b=[];if(!state.premium)b.push({t:'privatenote'});b=b.concat(ev.map(function(e){return {t:'reco',id:e.id,reason:'Members only'};}));if(!ev.length)b.push({t:'emptycat'});return b;}
 return foryouFeed();}
function renderBlock(bk){
 if(bk.t==='hero')return coverCard(byId(bk.id),420,bk.reason);
 if(bk.t==='reco')return recoBlock(byId(bk.id),bk.reason);
 if(bk.t==='proof')return proofCard(byId(bk.id));
 if(bk.t==='host')return hostCard(byId(bk.id),bk.ago);
 if(bk.t==='friend')return friendCard(byId(bk.id),bk.who,bk.action,bk.ago);
 if(bk.t==='premium')return premiumFeedCard(byId(bk.id));
 if(bk.t==='post')return postCard(bk.post);
 if(bk.t==='strip')return strip(bk.title,bk.ids);
 if(bk.t==='collection')return strip(bk.title,bk.ids,bk.sub);
 if(bk.t==='privatenote')return '<div class="card" style="padding:15px;display:flex;gap:11px;align-items:flex-start;border-color:rgba(201,168,106,.3)"><span style="color:var(--gold);margin-top:1px">'+ico('lock',20,1.8)+'</span><div style="flex:1"><div style="font-size:13.5px;color:var(--bone);line-height:1.5"><b>Private events</b> are hosted for verified members. Join Premium to reserve a seat.</div><button class="press" data-act="nav" data-screen="premium" style="margin-top:10px;background:var(--gold);color:#0B0A0C;border:none;border-radius:11px;padding:9px 15px;font-weight:600;font-size:13px;cursor:pointer">Explore Premium</button></div></div>';
 if(bk.t==='emptycat')return '<div style="text-align:center;padding:36px 24px;color:var(--ash);font-size:13.5px">No private events in '+cityShort()+' right now.</div>';
 if(bk.t==='empty')return '<div style="text-align:center;padding:46px 24px;color:var(--ash)"><div style="font-size:15px;font-weight:600;color:var(--bone);margin-bottom:6px">Quiet in here</div><div style="font-size:13.5px;line-height:1.5">Follow hosts and people to see their new events and posts.</div></div>';
 return '';}

 return '<div style="padding:6px 20px calc(var(--bot) + 24px)">'
 +'<div style="display:flex;justify-content:space-between;align-items:center;margin:4px 0 16px">'
 +'<button class="press" data-act="picker" style="background:none;border:none;padding:0;cursor:pointer;text-align:left"><div style="font-size:12.5px;color:var(--ash)">Good evening, Ava</div>'
 +'<div style="display:flex;align-items:center;gap:5px;margin-top:1px;color:var(--ember)">'+ico('pin',15,2)+'<span style="font-weight:700;font-size:21px;letter-spacing:-.02em;color:var(--bone)">'+cityShort()+'</span><span style="color:var(--ash)">'+ico('chevD',14)+'</span></div></button>'

 +'<button class="press hicon" data-act="host:open" title="Create">'+ico('plus',24)+'</button>'
 +'<button class="press hicon" data-act="nav" data-screen="notifications" style="position:relative">'+ico('bell',22)+(unreadNotifs()?'<span style="position:absolute;top:7px;right:8px;min-width:7px;height:7px;border-radius:50%;background:var(--ember);border:1.5px solid var(--ink)"></span>':'')+'</button>'

var PRICE_OPTS=['Any price','Free','Under $30','$30+'];
var SORT_OPTS=['Recommended','Soonest','Nearest','Most popular','Price'];
function filtersActive(){return state.whenIdx>0||state.priceIdx>0||state.sortIdx>0;}
function filterSort(list){var l=list.slice();
 if(state.priceIdx===1)l=l.filter(function(e){return e.minPrice===0;});
 else if(state.priceIdx===2)l=l.filter(function(e){return e.minPrice>0&&e.minPrice<30;});
 else if(state.priceIdx===3)l=l.filter(function(e){return e.minPrice>=30;});
 if(state.whenIdx===1)l=l.filter(function(e){return /Tonight|Tomorrow/.test(e.when);});
 else if(state.whenIdx===2)l=l.filter(function(e){return /Sat|Sun|Tonight/.test(e.when);});
 if(state.sortIdx===2)l.sort(function(a,b){return a.dist-b.dist;});
 else if(state.sortIdx===3||state.sortIdx===0)l.sort(function(a,b){return b.going-a.going;});
 else if(state.sortIdx===4)l.sort(function(a,b){return a.minPrice-b.minPrice;});
 return l;}

  case 'followhost':state.followingHosts[d.host]=!state.followingHosts[d.host];render();toast(state.followingHosts[d.host]?'Following '+d.host:'Unfollowed '+d.host);break;
  case 'followuser':state.followingUsers[d.key]=!state.followingUsers[d.key];render();toast(state.followingUsers[d.key]?'Following '+USERS[d.key].name:'Unfollowed');break;
  case 'cat':state.exploreCat=d.cat;state.query='';go('discover');break;
  case 'cat:clear':state.exploreCat=null;render();break;
  case 'search:clear':state.query='';var si=document.getElementById('searchInput');if(si){si.value='';si.focus();}patchDiscover();var scc=document.getElementById('searchClear');if(scc)scc.style.display='none';break;
  case 'picker':wheel.country=state.country;wheel.city=state.cityIdx;state.pickerOpen=true;render();break;
  case 'picker:close':state.pickerOpen=false;render();break;
  case 'wheelpick':var sc=document.getElementById('cwScroll');if(sc)sc.scrollTo({top:(+d.idx)*ITEM_H,behavior:'smooth'});break;
  case 'citypick':wheel.city=+d.idx;var cpn=document.getElementById('cityPanel');if(cpn)cpn.innerHTML=cityPanelHTML();break;
  case 'loc:confirm':state.country=wheel.country;state.cityIdx=wheel.city;state.exploreCat=null;state.query='';state.pickerOpen=false;state.screen='home';render();toast('Now exploring '+cityName());break;
  case 'loc:visiting':state.country=wheel.country;state.cityIdx=wheel.city;state.pickerOpen=false;go('tourist');break;
  case 'filter:open':state.filterOpen=true;render();break;
  case 'filter:close':state.filterOpen=false;render();break;
  case 'filter:clear':state.whenIdx=state.priceIdx=state.sortIdx=0;render();break;
  case 'when':state.whenIdx=+d.idx;render();break;
  case 'price':state.priceIdx=+d.idx;render();break;
  case 'sort':state.sortIdx=+d.idx;render();break;
  case 'host:open':openCreate();break;
  case 'create:cat':state.create.cat=d.cat;render();break;
  case 'create:free':state.create.paid=false;render();break;
  case 'create:paid':state.create.paid=true;render();break;
  case 'create:next':if(state.create.step===0&&!state.create.title.trim()){toast('Give your event a title');break;}state.create.step=Math.min(3,state.create.step+1);render();break;
  case 'create:back':state.create.step=Math.max(0,state.create.step-1);render();break;
  case 'create:exit':go('profile');break;
  case 'create:publish':publishEvent();break;
  case 'viewpublished':state._from='home';state.selectedId=state.publishedId;go('detail');break;
  case 'book':state.ticketType=0;state.qty=1;go('booking');break;
  case 'tier':state.ticketType=+d.idx;render();break;
  case 'inc':state.qty=Math.min(state.qty+1,10);render();break;
  case 'dec':state.qty=Math.max(state.qty-1,1);render();break;
  case 'tocheckout':go('checkout');break;
  case 'method':state.method=+d.idx;render();break;
  case 'pay':var e2=sel();state.myTickets.unshift({eventId:e2.id,tier:state.ticketType,qty:state.qty,rel:'Soon',status:'confirmed',past:false});go('confirm');break;
  case 'toticket':go('ticket');break;
  case 'viewticket':state.selectedId=+d.id;state.ticketType=+d.tier;state.qty=+d.qty;state._from='tickets';go('ticket');break;
  case 'tseg':state.ticketTab=d.seg;render();break;
  case 'saved':go('saved');break;
  case 'ptab':state.profileTab=d.tab;render();break;
  case 'settings':state.settingsKey=d.key||'Settings';go('settings');break;
  case 'toggle':state.notif[d.k]=!state.notif[d.k];render();break;
  case 'toggleflag':state[d.f]=!state[d.f];render();break;
  case 'back':back();break;
  case 'notiftap':var n=NOTIFS[+d.idx];n.unread=false;if(n.act==='open'){state._from='notifications';state.selectedId=n.id;state.ticketType=0;state.qty=1;go('detail');}else if(n.act==='user'){state._from='notifications';state.profileUser=n.key;go('userprofile');}else if(n.act==='thread'){state._from='notifications';state.threadUser=n.key;var cv0=convoOf(n.key);if(cv0)cv0.unread=0;go('thread');}else if(n.act==='nav'){go(n.screen);}else render();break;
  case 'readall':NOTIFS.forEach(function(x){x.unread=false;});render();break;
  case 'signout':toast('Signed out');break;
  case 'toast':toast(d.msg);break;
  case 'thread':state._from=state.screen;state.threadUser=d.key;var cv=convoOf(d.key);if(cv)cv.unread=0;go('thread');break;
  case 'send':doSend();break;
  case 'user':state._from=(state.screen==='userprofile'?state._from:state.screen);state.profileUser=d.key;closeSheets();go('userprofile');break;
  case 'more':state.moreCtx={type:d.mtype,key:d.key,id:d.id};state.moreOpen=true;render();break;
  case 'more:close':state.moreOpen=false;render();break;
  case 'mute':state.muted[d.key]=true;state.moreOpen=false;render();toast('Muted @'+USERS[d.key].handle);break;
  case 'unmute':delete state.muted[d.key];render();toast('Unmuted');break;
  case 'block':state.blocked[d.key]=true;state.muted[d.key]=true;state.moreOpen=false;render();toast('Blocked @'+USERS[d.key].handle);break;
  case 'unblock':delete state.blocked[d.key];render();toast('Unblocked');break;
  case 'report:open':state.reportCtx={rtype:d.rtype,key:d.key,id:d.id};state.moreOpen=false;state.reportOpen=true;render();break;
  case 'report:close':state.reportOpen=false;render();break;
  case 'report:reason':state.reportOpen=false;render();toast('Report received — we review within 24 hours');break;
  case 'compose:open':state.composeOpen=true;render();break;
  case 'compose:close':state.composeOpen=false;render();break;
  case 'compose:rmphoto':state.draftPhoto=null;render();break;
  case 'compose:post':doPost();break;
  case 'likepost':toast('Liked');break;
  case 'delpost':state.posts=state.posts.filter(function(p){return p.id!==d.id;});state.moreOpen=false;render();toast('Post deleted');break;
  case 'subscribe':state.premium=true;go('profile');toast('Welcome to Premium — you’re verified');break;
  case 'cancelprem':state.premium=false;state.settingsKey='Settings';render();toast('Membership cancelled');break;
  case 'delacct':toast('Account deletion requested — check your email');break;
 }}
function doSend(){var inp=document.getElementById('msgInput');if(!inp)return;var v=inp.value.trim();if(!v)return;var cv=convoOf(state.threadUser);if(!cv){cv={user:state.threadUser,ago:'now',unread:0,msgs:[]};CONVOS.push(cv);}cv.msgs.push({f:'me',t:v,w:'now'});cv.ago='now';inp.value='';render();
 setTimeout(function(){if(state.screen==='thread'&&state.threadUser===cv.user&&!state.blocked[cv.user]){cv.msgs.push({f:'them',t:pick(rng(hashStr(v+cv.msgs.length)),['see you there','love that','count me in','haha yes','on my way soon','perfect','sounds good']),w:'now'});render();}},900);}
function doPost(){var txt=(state.composeText||'').trim();if(!txt&&!state.draftPhoto){toast('Write something or add a photo');return;}state.posts.unshift({id:'u'+GEN_ID++,author:'ava',ago:'now',text:txt||'',photo:state.draftPhoto,likes:0,replies:0,eventId:null});state.composeText='';state.draftPhoto=null;state.composeOpen=false;state.profileTab='posts';go('profile');toast('Posted');}
function onInput(e){var t=e.target,di=t.getAttribute&&t.getAttribute('data-input');if(!di)return;
 if(di==='search'){state.query=t.value;patchDiscover();var sc=document.getElementById('searchClear');if(sc)sc.style.display=t.value?'flex':'none';}
 else if(di==='msg'){}
 else if(di==='comp'){state.composeText=t.value;}
 else if(di.indexOf('c_')===0){var f={c_title:'title',c_about:'about',c_date:'date',c_time:'time',c_venue:'venue',c_price:'price'}[di];if(f)state.create[f]=t.value;}}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey&&e.target.id==='msgInput'){e.preventDefault();doSend();}}
document.addEventListener('click',onClick);
document.addEventListener('input',onInput);
document.addEventListener('keydown',onKey);
render();

</script>
